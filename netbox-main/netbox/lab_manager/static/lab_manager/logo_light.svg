<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 88" shape-rendering="crispEdges">
  <g transform="translate(6,10) scale(1)">
    <!-- Bubbles -->
    <rect x="6" y="2" width="5" height="5" fill="#00ff41" opacity="0.5"/>
    <rect x="30" y="0" width="4" height="4" fill="#00ff41" opacity="0.35"/>
    <rect x="0" y="8" width="4" height="4" fill="#00e5ff" opacity="0.55"/>
    <!-- Beaker top rim -->
    <rect x="12" y="6" width="3" height="10" fill="#00e5ff"/>
    <rect x="29" y="6" width="3" height="10" fill="#00e5ff"/>
    <rect x="15" y="4" width="14" height="2" fill="#00e5ff" opacity="0.4"/>
    <!-- Beaker body -->
    <rect x="15" y="16" width="14" height="3" fill="#00e5ff"/>
    <rect x="15" y="19" width="3" height="24" fill="#00e5ff"/>
    <rect x="26" y="19" width="3" height="24" fill="#00e5ff"/>
