  <text x="68" y="58" font-family="Courier New, monospace" font-size="22" font-weight="900" fill="#00e5ff" letter-spacing="4">SHIYANSHI</text>
  <text x="68" y="76" font-family="Courier New, monospace" font-size="10" fill="#6b7280" letter-spacing="5">[ LAB v2.0 ]</text>
</svg>