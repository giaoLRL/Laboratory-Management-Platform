{% load i18n %}
{% if tasks %}
<table class="table table-hover">
    <thead>
        <tr>
            <th>{% trans "任务" %}</th>
            <th>{% trans "优先级" %}</th>
            <th>{% trans "截止日期" %}</th>
            <th>{% trans "操作" %}</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td><a href="{{ task.get_absolute_url }}">{{ task.title }}</a></td>
            <td>{% badge task.get_priority_display %}</td>
            <td>{{ task.deadline|default:'—' }}</td>
            <td>
                <a href="{% url 'plugins:lab_manager:task_upload' pk=task.pk %}" class="btn btn-sm btn-outline-primary">
                    <i class="mdi mdi-upload"></i> {% trans "上传" %}
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted p-3">{% trans "暂无任务" %}</p>
{% endif %}
